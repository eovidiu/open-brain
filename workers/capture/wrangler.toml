name = "open-brain-capture"
main = "src/index.ts"
compatibility_date = "2026-07-04"

[vars]
# Non-secret configuration. Metadata-extraction provider: "openai" or "anthropic"
# (anthropic requires funded API credits on the Anthropic account).
METADATA_LLM_PROVIDER = "openai"

# Secrets (set with `wrangler secret put <NAME>`, never committed):
#   DATABASE_URL              Neon connection string (direct endpoint)
#   CAPTURE_JWT_SECRET        HS256 signing secret for Bearer JWT auth
#   CAPTURE_WEBHOOK_SECRET    HMAC signing secret for X-OpenBrain-Signature auth
#   OPENAI_API_KEY            embeddings (text-embedding-3-small)
#   OPENAI_METADATA_API_KEY   optional override of OPENAI_API_KEY for metadata calls
#   ANTHROPIC_API_KEY         required only when METADATA_LLM_PROVIDER = "anthropic"
